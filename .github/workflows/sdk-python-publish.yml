name: SDK Python Publish (PyPI)

on:
  push:
    tags:
      - 'sdk-py-v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. sdk-py-v0.3.0)'
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lyrie-agent
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install build
        run: python -m pip install --upgrade pip build twine
      - name: Build
        run: python -m build
      - name: Verify with twine
        run: python -m twine check dist/*
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          skip-existing: true
