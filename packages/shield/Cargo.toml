[package]
name = "lyrie-shield"
version = "1.0.0"
edition = "2021"
authors = ["OTT Cybersecurity LLC <dev@lyrie.ai>"]
description = "Lyrie Shield v1.0.0 GA — production-grade cybersecurity engine for Lyrie Agent with hash-signature scanning, heuristic analysis, and LyrieRules engine"
license = "MIT"
repository = "https://github.com/lyrie-ai/lyrie-agent"
homepage = "https://lyrie.ai"

[lib]
name = "lyrie_shield"
path = "src/lib.rs"

[[bin]]
name = "lyrie-shield"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
sha2 = "0.10"
hex = "0.4"
walkdir = "2"
notify = "8"
reqwest = { version = "0.12", features = ["json"] }
