[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lyrie-omega"
version = "1.0.1"
description = "Omega-Suite — Lyrie.ai's autonomous binary analysis and exploit research engine"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "OTT Cybersecurity LLC", email = "dev@lyrie.ai"}]
keywords = ["security", "binary-analysis", "exploit", "pentest", "AI", "lyrie"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Information Technology",
    "Topic :: Security",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.10"
dependencies = [
    "requests>=2.32.0",
    "pydantic>=2.9.2",
    "instructor>=1.0.0",
    "tabulate>=0.9.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.20.0"]
full = ["openai>=1.0.0", "anthropic>=0.20.0", "google-genai>=0.3.0"]
analysis = ["z3-solver>=4.12.0", "tree-sitter>=0.21.0"]

[project.urls]
Homepage = "https://lyrie.ai"
Repository = "https://github.com/OTT-Cybersecurity-LLC/lyrie-ai"
Documentation = "https://lyrie.ai/omega"
Issues = "https://github.com/OTT-Cybersecurity-LLC/lyrie-ai/issues"

[project.scripts]
lyrie-omega = "omega.cli:main"
lyrie = "omega.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["omega"]
